<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1000" height="620" fill="#ffffff"/>
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a1a">Intelligent Vendor Routing Platform - Architecture</text>

  <!-- Client -->
  <rect x="40" y="90" width="140" height="60" rx="8" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="110" y="125" text-anchor="middle" font-size="14" fill="#1a1a1a">Client</text>

  <!-- arrow to API -->
  <line x1="180" y1="120" x2="250" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="110" text-anchor="middle" font-size="11">POST /route</text>

  <!-- API Gateway -->
  <rect x="250" y="90" width="180" height="60" rx="8" fill="#fef7e0" stroke="#f9ab00" stroke-width="2"/>
  <text x="340" y="115" text-anchor="middle" font-size="13" font-weight="bold">Unified API</text>
  <text x="340" y="133" text-anchor="middle" font-size="11">/route  /verify-pan</text>

  <line x1="430" y1="120" x2="500" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Router Engine -->
  <rect x="500" y="70" width="220" height="100" rx="8" fill="#e6f4ea" stroke="#188038" stroke-width="2"/>
  <text x="610" y="95" text-anchor="middle" font-size="13" font-weight="bold">Vendor Router Engine</text>
  <text x="610" y="115" text-anchor="middle" font-size="10.5">Strategy selection (8 modes)</text>
  <text x="610" y="132" text-anchor="middle" font-size="10.5">Eligibility filter + failover loop</text>
  <text x="610" y="149" text-anchor="middle" font-size="10.5">Standardized response builder</text>

  <!-- side boxes: store, logger, agent -->
  <rect x="760" y="60" width="200" height="50" rx="8" fill="#f3e8fd" stroke="#a142f4" stroke-width="2"/>
  <text x="860" y="80" text-anchor="middle" font-size="11.5" font-weight="bold">Vendor Store</text>
  <text x="860" y="96" text-anchor="middle" font-size="10">config + live metrics</text>

  <rect x="760" y="120" width="200" height="50" rx="8" fill="#f3e8fd" stroke="#a142f4" stroke-width="2"/>
  <text x="860" y="140" text-anchor="middle" font-size="11.5" font-weight="bold">Logger</text>
  <text x="860" y="156" text-anchor="middle" font-size="10">request logs + routing-decision logs</text>

  <rect x="760" y="180" width="200" height="60" rx="8" fill="#fce8e6" stroke="#d93025" stroke-width="2"/>
  <text x="860" y="203" text-anchor="middle" font-size="11.5" font-weight="bold">Agent (bonus)</text>
  <text x="860" y="219" text-anchor="middle" font-size="10">recommend / explain / detect /</text>
  <text x="860" y="233" text-anchor="middle" font-size="10">suggest fallback / NL-to-config</text>

  <line x1="720" y1="100" x2="760" y2="85" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="120" x2="760" y2="145" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="140" x2="760" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrows down to vendors -->
  <line x1="560" y1="170" x2="330" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="170" x2="610" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="170" x2="880" y2="280" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="420" y="235" font-size="11" fill="#555">try #1 (priority/weighted/etc.)</text>
  <text x="640" y="235" font-size="11" fill="#555">failover on error/timeout</text>
  <text x="760" y="235" font-size="11" fill="#555">failover chain continues</text>

  <!-- Vendor boxes -->
  <rect x="220" y="280" width="220" height="70" rx="8" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="330" y="308" text-anchor="middle" font-size="13" font-weight="bold">Vendor A</text>
  <text x="330" y="326" text-anchor="middle" font-size="10.5">priority 1 · weight 70 · $1.5</text>
  <text x="330" y="341" text-anchor="middle" font-size="10.5">timeout 2000ms</text>

  <rect x="500" y="280" width="220" height="70" rx="8" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="610" y="308" text-anchor="middle" font-size="13" font-weight="bold">Vendor B</text>
  <text x="610" y="326" text-anchor="middle" font-size="10.5">priority 2 · weight 30 · $1.2</text>
  <text x="610" y="341" text-anchor="middle" font-size="10.5">timeout 3000ms</text>

  <rect x="780" y="280" width="180" height="70" rx="8" fill="#fff" stroke="#666" stroke-width="2"/>
  <text x="870" y="308" text-anchor="middle" font-size="13" font-weight="bold">Vendor C</text>
  <text x="870" y="326" text-anchor="middle" font-size="10.5">priority 3 · fallback</text>
  <text x="870" y="341" text-anchor="middle" font-size="10.5">timeout 4000ms</text>

  <!-- return path -->
  <line x1="330" y1="350" x2="330" y2="420" stroke="#0b8043" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowgreen)"/>
  <line x1="610" y1="350" x2="500" y2="420" stroke="#0b8043" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowgreen)"/>
  <line x1="870" y1="350" x2="620" y2="420" stroke="#0b8043" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowgreen)"/>

  <rect x="300" y="420" width="400" height="60" rx="8" fill="#e6f4ea" stroke="#188038" stroke-width="2"/>
  <text x="500" y="445" text-anchor="middle" font-size="13" font-weight="bold">Standardized Response</text>
  <text x="500" y="463" text-anchor="middle" font-size="10.5">{ status, vendorUsed, routingReason, latencyMs, cost, response }</text>

  <line x1="500" y1="480" x2="500" y2="520" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="520" x2="180" y2="520" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="520" x2="115" y2="520" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="115" y1="520" x2="115" y2="150" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330" y="510" text-anchor="middle" font-size="11" fill="#555">client never knows which vendor served the request</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0b8043"/>
    </marker>
  </defs>
</svg>
